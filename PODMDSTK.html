<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ОТК · Приёмка сантехкабины</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#EEF1F3;
    --bg-grid:#E1E7EB;
    --surface:#FFFFFF;
    --surface-2:#F6F8F9;
    --ink:#1B2430;
    --ink-soft:#5B6573;
    --ink-faint:#8993A1;
    --line:#D7DCE1;
    --line-strong:#C2C9D0;
    --blue:#1E5F8C;
    --blue-deep:#16486B;
    --blue-bg:#E6EEF3;
    --rust:#B5562B;
    --rust-deep:#8E4220;
    --rust-bg:#F3E7E0;
    --ok:#2E7D4F;
    --ok-bg:#E4F2E9;
    --bad:#C23B3B;
    --bad-bg:#FBEAEA;
    --na:#8A8F98;
    --na-bg:#EEF0F2;
    --crit:#C9821A;
    --radius:14px;
    --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,28,38,.06),0 8px 20px -10px rgba(20,28,38,.18);
    --font-d:'Oswald',sans-serif;
    --font-b:'Inter',sans-serif;
    --font-m:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px);
    background-size:26px 26px;
    font-family:var(--font-b);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button,input,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:28px;position:relative;}

  /* ---------- HOME ---------- */
  .hero{padding:30px 18px 14px;}
  .hero-eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .hero-title{font-family:var(--font-d);font-weight:600;font-size:clamp(24px,6vw,30px);margin:6px 0 8px;letter-spacing:.01em;line-height:1.15;}
  .hero-sub{font-size:14px;line-height:1.5;color:var(--ink-soft);margin:0;max-width:46ch;}

  .type-tabs{display:flex;gap:8px;padding:6px 18px 0;}
  .type-tab{flex:1;border:1.5px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);
    font-family:var(--font-d);font-size:13px;letter-spacing:.03em;text-transform:uppercase;
    padding:12px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;}
  .type-tab.tab-blue.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .type-tab.tab-rust.active{background:var(--rust);border-color:var(--rust);color:#fff;}
  .type-tab:not(.active):hover{border-color:var(--ink-faint);}

  .new-check{display:flex;gap:8px;padding:14px 18px 6px;}
  .cabin-input{flex:1;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);padding:11px 12px;
    font-family:var(--font-m);font-size:14px;background:var(--surface);color:var(--ink);}
  .cabin-input::placeholder{color:var(--ink-faint);font-family:var(--font-b);}
  .btn{border:none;border-radius:var(--radius-sm);padding:11px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
    transition:.15s;white-space:nowrap;}
  .btn-primary-blue{background:var(--blue);color:#fff;}
  .btn-primary-blue:hover{background:var(--blue-deep);}
  .btn-primary-rust{background:var(--rust);color:#fff;}
  .btn-primary-rust:hover{background:var(--rust-deep);}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);}
  .btn-summary{background:var(--ink);color:#fff;flex:1;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}

  .cabin-list{padding:14px 18px 0;display:flex;flex-direction:column;gap:10px;}
  .empty-hint{font-size:13.5px;color:var(--ink-faint);padding:18px 2px;line-height:1.5;}

  .cabin-card{display:flex;align-items:stretch;gap:0;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .cabin-card-main{flex:1;text-align:left;background:none;border:none;padding:13px 14px;cursor:pointer;}
  .cabin-card-top{display:flex;align-items:center;justify-content:space-between;}
  .cabin-id{font-family:var(--font-m);font-weight:600;font-size:14.5px;}
  .cabin-dot{width:9px;height:9px;border-radius:50%;}
  .dot-empty{background:var(--na);}
  .dot-partial{background:var(--blue);}
  .dot-done{background:var(--ok);}
  .dot-issue{background:var(--bad);}
  .cabin-progress-track{height:5px;background:var(--surface-2);border-radius:4px;margin:8px 0 6px;overflow:hidden;}
  .cabin-progress-fill{height:100%;border-radius:4px;}
  .fill-empty{background:var(--na);}
  .fill-partial{background:var(--blue);}
  .fill-done{background:var(--ok);}
  .fill-issue{background:var(--bad);}
  .cabin-stage-meta{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;}
  .cabin-meta{font-size:11.5px;color:var(--ink-faint);}
  .cabin-del{width:42px;border:none;background:var(--surface-2);color:var(--ink-faint);cursor:pointer;font-size:13px;
    border-left:1px solid var(--line);}
  .cabin-del.confirming{background:var(--bad);color:#fff;font-size:10.5px;font-weight:700;}

  /* ---------- CHECKLIST ---------- */
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;position:sticky;top:0;z-index:5;
    background:rgba(238,241,243,.92);backdrop-filter:blur(6px);}
  .iconbtn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line-strong);background:var(--surface);
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .iconbtn:disabled{opacity:.3;}
  .topbar-info{flex:1;min-width:0;}
  .topbar-cabin{font-size:13px;color:var(--ink-soft);}
  .topbar-cabin b{font-family:var(--font-m);color:var(--ink);}
  .topbar-type{font-family:var(--font-d);font-size:15px;letter-spacing:.02em;text-transform:uppercase;}
  .accent-blue .topbar-type{color:var(--blue);}
  .accent-rust .topbar-type{color:var(--rust);}
  .save-indicator{font-size:10.5px;color:var(--ink-faint);font-family:var(--font-m);white-space:nowrap;}

  .stage-chips{display:flex;gap:7px;padding:2px 14px 14px;overflow-x:auto;}
  .chip{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:2px solid var(--line-strong);background:var(--surface);
    font-family:var(--font-m);font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .chip.active{border-color:var(--ink);color:var(--ink);box-shadow:0 0 0 3px rgba(27,36,48,.08);}
  .chip-empty{border-color:var(--line-strong);}
  .chip-partial{border-color:var(--blue);color:var(--blue);}
  .accent-rust .chip-partial{border-color:var(--rust);color:var(--rust);}
  .chip-done{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
  .chip-issue{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}

  .stage-panel{padding:0 14px;}
  .stage-head{padding:4px 4px 14px;}
  .stage-eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);}
  .stage-title{font-family:var(--font-d);font-weight:600;font-size:21px;margin:4px 0 2px;line-height:1.2;}
  .stage-sub{font-size:13px;color:var(--ink-soft);}

  .block-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);
    margin:18px 4px 8px;}

  .item{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--line-strong);
    border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:8px;}
  .item.st-ok{border-left-color:var(--ok);}
  .item.st-bad{border-left-color:var(--bad);background:var(--bad-bg);}
  .item.st-na{border-left-color:var(--na);}
  .item-row{display:flex;gap:9px;align-items:flex-start;}
  .item-num{font-family:var(--font-m);font-size:11.5px;color:var(--ink-faint);padding-top:2px;min-width:16px;}
  .item-text{font-size:14px;line-height:1.42;flex:1;}
  .crit{color:var(--crit);margin-right:4px;}
  .item-controls{display:flex;gap:6px;margin-top:9px;}
  .sbtn{width:34px;height:30px;border-radius:7px;border:1.5px solid var(--line-strong);background:var(--surface);
    font-size:14px;cursor:pointer;color:var(--ink-soft);}
  .sbtn.ok.active{background:var(--ok);border-color:var(--ok);color:#fff;}
  .sbtn.bad.active{background:var(--bad);border-color:var(--bad);color:#fff;}
  .sbtn.na.active{background:var(--na);border-color:var(--na);color:#fff;}
  .ntbtn{margin-left:auto;width:34px;height:30px;border-radius:7px;border:1.5px solid var(--line);background:var(--surface-2);
    color:var(--ink-faint);cursor:pointer;}
  .ntbtn.has{color:var(--blue);border-color:var(--blue);}
  .note-area{width:100%;margin-top:9px;border:1px solid var(--line-strong);border-radius:7px;padding:8px 9px;
    font-size:13px;font-family:var(--font-b);resize:vertical;background:var(--surface);color:var(--ink);}

  .signoff{margin:18px 4px 26px;padding:14px;border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:var(--surface-2);}
  .signoff-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700;margin-bottom:9px;}
  .signoff-pending{display:flex;gap:8px;}
  .signoff-input{flex:1;border:1.5px solid var(--line-strong);border-radius:7px;padding:9px 10px;font-size:13px;background:var(--surface);}
  .btn-stamp{background:var(--ink);color:#fff;font-size:12.5px;padding:9px 12px;}
  .signoff-done{display:flex;align-items:center;gap:10px;}
  .mini-stamp{font-family:var(--font-d);font-size:11px;border:2px double var(--ok);color:var(--ok);
    border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;transform:rotate(-8deg);flex:0 0 auto;}
  .signoff-meta{flex:1;display:flex;flex-direction:column;font-size:12.5px;color:var(--ink-soft);}
  .signoff-meta b{font-size:13.5px;color:var(--ink);}
  .link-btn{background:none;border:none;color:var(--ink-faint);text-decoration:underline;font-size:12px;cursor:pointer;padding:0;}

  .bottom-bar{position:sticky;bottom:0;background:rgba(238,241,243,.95);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));margin-top:6px;}
  .progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .progress-track{flex:1;height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;border:1px solid var(--line);}
  .progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .2s;}
  .accent-rust .progress-fill{background:var(--rust);}
  .progress-label{font-family:var(--font-m);font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}
  .bottom-actions{display:flex;gap:8px;align-items:center;}

  /* ---------- MODAL ---------- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,28,38,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .modal{background:var(--surface);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:26px 22px calc(22px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:14px;animation:slideUp .25s ease-out;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .stamp{width:108px;height:108px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    transform:rotate(-7deg);font-family:var(--font-d);text-transform:uppercase;letter-spacing:.04em;
    animation:stampDown .35s cubic-bezier(.2,1.4,.4,1);}
  @keyframes stampDown{from{transform:rotate(-20deg) scale(1.5);opacity:0;}to{transform:rotate(-7deg) scale(1);opacity:1;}}
  .stamp span{font-size:19px;font-weight:700;}
  .stamp small{font-size:9.5px;letter-spacing:.06em;text-align:center;line-height:1.3;margin-top:2px;}
  .stamp--pending{border:3px double var(--na);color:var(--na);}
  .stamp--ok{border:3px double var(--ok);color:var(--ok);}
  .stamp--issues{border:3px double var(--crit);color:var(--crit);}
  .stamp--critical{border:3px double var(--bad);color:var(--bad);}
  .modal-stats{display:flex;gap:22px;}
  .modal-stats div{display:flex;flex-direction:column;align-items:center;}
  .modal-stats b{font-family:var(--font-m);font-size:18px;}
  .modal-stats span{font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;}
  .modal-cabin{font-size:13px;color:var(--ink-soft);}
  .modal-cabin b{font-family:var(--font-m);color:var(--ink);}
  .modal-actions{display:flex;gap:10px;width:100%;margin-top:4px;}
  .modal-actions .btn{flex:1;}

  @media print{
    .topbar,.stage-chips,.bottom-bar,.modal-actions,.cabin-del,.iconbtn{display:none !important;}
    body{background:#fff;}
    .item{break-inside:avoid;}
    .print-only-title{display:block !important;}
  }
  .print-only-title{display:none;font-family:var(--font-h);font-size:18px;font-weight:600;margin:0 0 14px;}

  /* ---------- DEFECT CODES ---------- */
  .code-picker{margin-top:9px;border-top:1px dashed var(--line-strong);padding-top:9px;}
  .code-picker-label{font-size:11.5px;color:var(--ink-faint);margin-bottom:6px;}
  .code-chip-wrap{display:flex;flex-wrap:wrap;gap:6px;}
  .code-chip{border:1.5px solid var(--line-strong);background:var(--surface);border-radius:7px;
    padding:6px 8px;font-size:12px;line-height:1.3;text-align:left;cursor:pointer;color:var(--ink-soft);max-width:100%;}
  .code-chip b{font-family:var(--font-m);margin-right:4px;color:var(--ink);}
  .code-chip.active{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
  .code-chip.active b{color:var(--bad);}
  .codes-badge{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0 0 25px;}
  .code-tag{font-family:var(--font-m);font-size:11px;background:var(--bad);color:#fff;border-radius:5px;padding:2px 6px;}
  .live-badge{margin:6px 0 0 25px;font-size:11px;font-weight:600;color:var(--ok);display:flex;align-items:center;gap:4px;}
  .checked-badge{margin:6px 0 0 25px;font-size:11px;color:var(--ink-faint);}
  .checked-badge b{color:var(--ink-soft);font-family:var(--font-m);}

  /* ---------- ANALYTICS ---------- */
  .analytics-link{padding:8px 18px 0;}
  .analytics-link .btn{width:100%;}
  .analytics-summary{display:flex;gap:18px;padding:2px 4px 4px;}
  .analytics-summary div{display:flex;flex-direction:column;align-items:flex-start;}
  .analytics-summary b{font-family:var(--font-m);font-size:19px;}
  .analytics-summary span{font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;}
  .defect-list{display:flex;flex-direction:column;gap:8px;}
  .defect-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:10px 12px;box-shadow:var(--shadow);}
  .defect-rank{font-family:var(--font-m);font-weight:700;color:var(--ink-faint);width:18px;text-align:center;flex:0 0 auto;}
  .defect-info{flex:1;min-width:0;}
  .defect-text{font-size:13.5px;line-height:1.35;}
  .defect-meta{font-size:11px;color:var(--ink-faint);margin-top:2px;font-family:var(--font-m);}
  .defect-count{font-family:var(--font-m);font-weight:700;font-size:18px;color:var(--bad);flex:0 0 auto;}
  .cat-list{display:flex;flex-direction:column;gap:11px;}
  .cat-row-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
  .cat-row-top b{font-family:var(--font-m);}
  .cat-bar-track{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;border:1px solid var(--line);}
  .cat-bar-fill{height:100%;background:var(--bad);border-radius:4px;}

  /* ---------- Приёмка: начало/конец ---------- */
  .accept-bar{display:flex;flex-wrap:wrap;gap:10px 12px;align-items:flex-end;background:var(--surface);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px 14px;margin:0 0 6px;}
  .accept-field{flex:1;min-width:150px;}
  .accept-field > label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    color:var(--ink-faint);margin-bottom:5px;}
  .accept-row{display:flex;gap:6px;}
  .accept-input{flex:1;min-width:0;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);
    padding:9px 10px;font-family:var(--font-m);font-size:13px;background:var(--surface);color:var(--ink);}
  .accept-now{border:1.5px solid var(--line-strong);background:var(--surface-2);color:var(--ink);
    border-radius:var(--radius-sm);padding:0 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .accept-now:hover{border-color:var(--ink-faint);}
  .accept-clear{border:none;background:none;color:var(--ink-faint);font-size:11px;cursor:pointer;text-decoration:underline;padding:2px 0;}
  .accept-duration{flex-basis:100%;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .accept-duration b{font-family:var(--font-m);color:var(--ink);}
  .accept-summary{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:10px 12px;margin:8px 0 2px;font-size:12.5px;color:var(--ink-soft);}
  .accept-summary .as-row{display:flex;justify-content:space-between;gap:10px;padding:2px 0;}
  .accept-summary b{font-family:var(--font-m);color:var(--ink);font-weight:600;}

  /* ---------- Режимы доступа ---------- */
  .mode-bar{display:flex;align-items:center;gap:10px;margin:10px 18px 0;padding:10px 12px;border:1px solid var(--line);
    border-radius:var(--radius-sm);background:var(--surface);box-shadow:var(--shadow);font-size:12.5px;flex-wrap:wrap;}
  .mode-bar .mode-state{flex:1;min-width:140px;color:var(--ink-soft);}
  .mode-bar .mode-state b{color:var(--ink);font-family:var(--font-m);}
  .mode-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:11px;font-weight:600;
    padding:4px 9px;border-radius:20px;white-space:nowrap;}
  .mode-badge.viewer{background:var(--na-bg);color:var(--na);}
  .mode-badge.inspector{background:var(--ok-bg);color:var(--ok);}
  .mode-btn{border:1.5px solid var(--line-strong);background:var(--surface-2);color:var(--ink);border-radius:var(--radius-sm);
    padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .mode-btn:hover{border-color:var(--ink-faint);}
  .mode-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .mode-btn.topbar-mode{padding:6px 9px;font-size:11px;}
  .signoff-who{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
  .signoff-who b{font-family:var(--font-m);color:var(--ink);}
  .signoff-locked{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-faint);
    background:var(--surface-2);border:1px dashed var(--line-strong);border-radius:var(--radius-sm);padding:11px 12px;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:60;background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:22px;font-size:13px;box-shadow:var(--shadow);max-width:88%;text-align:center;}
  /* Только просмотр: блокируем изменяющие элементы */
  #app.mode-viewer .sbtn,
  #app.mode-viewer .ntbtn,
  #app.mode-viewer .code-chip,
  #app.mode-viewer .note-area,
  #app.mode-viewer .btn-stamp,
  #app.mode-viewer .accept-input,
  #app.mode-viewer .accept-now,
  #app.mode-viewer .accept-clear,
  #app.mode-viewer .cabin-del,
  #app.mode-viewer .signoff .link-btn{ pointer-events:none;opacity:.45; }
  #app.mode-viewer .new-check{ display:none; }
</style>
</head>
<body>
<div id="app"></div>
<script>

function normalizeData(){
  Object.keys(DATA).forEach(typeKey=>{
    DATA[typeKey].stages.forEach((stage,si)=>{
      stage.num = si+1;
      if(stage.groups){
        stage.blocks = stage.groups.map(g=>({label:g.label, items:g.items}));
        delete stage.groups;
      } else {
        const blocks=[{items:stage.items}];
        if(stage.subItems){ blocks.push({label:stage.groupNote||'', items:stage.subItems}); }
        stage.blocks = blocks;
        delete stage.items; delete stage.subItems; delete stage.groupNote;
      }
      stage.blocks.forEach((block,bi)=>{
        block.items = block.items.map((raw,ii)=>{
          const obj = (typeof raw==='string') ? {t:raw,c:false} : {t:raw.t,c:!!raw.c};
          obj.id = typeKey+'_'+stage.id+'_'+bi+'_'+ii;
          return obj;
        });
      });
    });
  });
}
normalizeData();

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function slugify(s){ return String(s).trim().replace(/[\s\/\\'"]+/g,'_').slice(0,100) || 'cabin'; }
function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function currentStages(){ return DATA[state.type].stages; }

  }catch(e){ console.error('supabase get failed', e); return null; }
}
async function storageSet(key, value){
  try{
    const { error } = await sb.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
    if(error) throw error;
  }catch(e){ console.error('supabase set failed', e); }
}
async function storageDelete(key){
  try{
    const { error } = await sb.from('kv_store').delete().eq('key', key);
    if(error) throw error;
  }catch(e){ console.error('supabase delete failed', e); }
}

/* ---------- живая метка "сейчас проверяет" (Supabase Realtime Presence) ---------- */
const CLIENT_ID = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()));
let presenceChannel = null;
function rebuildLivePresence(){
  state.livePresence = {};
  if(!presenceChannel) return;
  const st = presenceChannel.presenceState();
  Object.keys(st).forEach(key=>{
    if(key===CLIENT_ID) return;
    (st[key]||[]).forEach(p=>{
      if(p && p.itemId) state.livePresence[p.itemId] = {inspectorId: p.inspectorId||'Аноним', at: p.at};
    });
  });
  render();
}
function joinPresence(type, slug){
  leavePresence();
  state.livePresence = {};
  presenceChannel = sb.channel('presence-'+type+'-'+slug, { config: { presence: { key: CLIENT_ID } } });
  presenceChannel
    .on('presence', {event:'sync'}, rebuildLivePresence)
    .on('presence', {event:'join'}, rebuildLivePresence)
    .on('presence', {event:'leave'}, rebuildLivePresence)
    .subscribe(async (status)=>{
      if(status==='SUBSCRIBED'){
        try{ await presenceChannel.track({inspectorId: state.inspectorId||'Аноним', itemId:null, at: Date.now()}); }catch(e){}
      }
    });
}
function leavePresence(){
  if(presenceChannel){ try{ sb.removeChannel(presenceChannel); }catch(e){} presenceChannel=null; }
  state.livePresence = {};
}
function trackPresence(itemId){
  if(!presenceChannel) return;
  try{ presenceChannel.track({inspectorId: state.inspectorId||'Аноним', itemId, at: Date.now()}); }catch(e){}
}
async function getIndexList(type){
  try{
    const raw = await storageGet('idx_'+type);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
async function loadChecklistStorage(type, slug){
  try{
    const raw = await storageGet('cl_'+type+'_'+slug);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function saveChecklistStorage(type, slug, data){
  try{ await storageSet('cl_'+type+'_'+slug, JSON.stringify(data)); }
  catch(e){ console.error('save failed', e); }
}
function computeSummary(type, data){
  let total=0, checked=0, bad=0, criticalBad=0;
  DATA[type].stages.forEach(stage=>{
    stage.blocks.forEach(block=>{
      block.items.forEach(item=>{
        total++;
        const rec = data.items[item.id];
        const st = rec && rec.status;
        if(st){ checked++; if(st==='bad'){ bad++; if(item.c) criticalBad++; } }
      });
    });
  });
  return {total, checked, bad, criticalBad};
}
async function updateIndexSummary(type, slug, cabin, data){
  try{
    const idx = await getIndexList(type);
    const summary = computeSummary(type, data);
    const stageProgress = computeStageProgress(type, data);
    const entry = Object.assign({slug, cabin, updatedAt:data.meta.updatedAt}, summary, stageProgress);
    const i = idx.findIndex(e=>e.slug===slug);
    if(i>=0) idx[i]=entry; else idx.unshift(entry);
    await storageSet('idx_'+type, JSON.stringify(idx));
    state.cabinIndexCache[type]=idx;
  }catch(e){ console.error('index save failed', e); }
}
async function refreshIndex(type){
  const list = await getIndexList(type);
  state.cabinIndexCache[type]=list;
  if(state.screen==='home') render();
}

let saveTimer=null;
function scheduleSave(){
  state.saveStatus='saving';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(flushSave,700);
  updateSaveIndicatorDom();
}
async function flushSave(){
  saveTimer=null;
  if(!state.type || !state.cabin) return;
  state.data.meta.updatedAt = new Date().toISOString();
  const slug = slugify(state.cabin);
  await saveChecklistStorage(state.type, slug, state.data);

  state.saveStatus='saved';
  updateSaveIndicatorDom();
}
function saveIndicatorText(){

function computeAnalytics(type, cabins){
  const itemIndex = {};
  DATA[type].stages.forEach(s=>s.blocks.forEach(b=>b.items.forEach(it=>{ itemIndex[it.id]=it; })));
  const codeCounts = {};
  const categoryCounts = {};
  let totalBad=0, totalCritical=0;
  cabins.forEach(({cabin, data})=>{
    Object.keys(data.items||{}).forEach(id=>{
      const rec = data.items[id];
      if(rec && rec.status==='bad'){
        totalBad++;
        const def = itemIndex[id];
        if(def && def.c) totalCritical++;
        (rec.codes||[]).forEach(code=>{
          if(!codeCounts[code]) codeCounts[code]={code, text:codeText(code), count:0, cabinSet:new Set()};
          codeCounts[code].count++;
          codeCounts[code].cabinSet.add(cabin);
          const catKey = codeCategoryKey(code);
          if(catKey) categoryCounts[catKey]=(categoryCounts[catKey]||0)+1;
        });
      }
    });
  });
  const topDefects = Object.values(codeCounts).sort((a,b)=>b.count-a.count).slice(0,10)
    .map(c=>({code:c.code, text:c.text, count:c.count, cabinsCount:c.cabinSet.size}));
  const byCategory = Object.keys(DEFECT_CATALOG).map(k=>({
    key:k, title:DEFECT_CATALOG[k].title, count:categoryCounts[k]||0
  })).sort((a,b)=>b.count-a.count);
  return {totalBad, totalCritical, topDefects, byCategory, cabinsCount:cabins.length};
}

  const idx = await getIndexList(type);

  for(const e of idx){
    const data = await loadChecklistStorage(type, e.slug);
    if(data) cabins.push({cabin:e.cabin, data});
  }
  state.analyticsData = computeAnalytics(type, cabins);
  state.analyticsLoading = false;
  if(state.screen==='analytics') render();
}

/* ---------- экспорт реестра несоответствий в Excel (авто-заполнение по шифрам) ---------- */
const CATEGORY_COLS = {'1':'Несоответствия СБОРКИ КАБИНЫ','2':'Несоответствия СБОРКИ ИНЖЕНЕРИИ','3':'Несоответствия УСТАНОВКИ САНТЕХ ПРИБОРОВ','4':'Несоответствия УКЛАДКИ ПЛИТКИ','5':'Несоответствия УСТАНОВКИ ПОТОЛКА','6':'Несоответствия ИТОГОВАЯ ПРИЕМКА'};
function itemIndexFor(type){
  const idx={};
  DATA[type].stages.forEach(s=>s.blocks.forEach(b=>b.items.forEach(it=>{ idx[it.id]=it; })));
  return idx;
}
function collectRowFromData(cabinName, assemblyData, finishingData){
  const catCodes = {'1':new Set(),'2':new Set(),'3':new Set(),'4':new Set(),'5':new Set(),'6':new Set()};
  let hasBad=false, hasCritical=false, totalItems=0, checkedItems=0;
  const notes=[];
  [['assembly',assemblyData],['finishing',finishingData]].forEach(([type,data])=>{
    if(!data) return;
    const itemIdx = itemIndexFor(type);
    const ids = Object.keys(itemIdx);
    totalItems += ids.length;
    ids.forEach(id=>{
      const rec = data.items[id];
      if(rec && rec.status) checkedItems++;
      if(rec && rec.status==='bad'){
        hasBad=true;
        if(itemIdx[id].c) hasCritical=true;
        if(rec.note) notes.push(rec.note.trim());
        (rec.codes||[]).forEach(code=>{
          const catKey = codeCategoryKey(code);
          if(catKey && catCodes[catKey]) catCodes[catKey].add(code);
        });
      }
    });
  });
  let status;
  if(checkedItems<totalItems) status='В обработке';
  else if(!hasBad) status='Принято';
  else if(hasCritical) status='Отказано';
  else status='Принято с отступлением';
  const criticality = hasCritical ? 'Критическое' : (hasBad ? 'Устранимое' : '');
  const dateSborki = (assemblyData && assemblyData.meta && assemblyData.meta.createdAt) || (finishingData && finishingData.meta && finishingData.meta.createdAt) || '';
  const dateAcc = (finishingData && finishingData.meta && finishingData.meta.acceptEnd) || (assemblyData && assemblyData.meta && assemblyData.meta.acceptEnd) || '';
  return {
    'Наименование': cabinName,
    'Дата сборки': dateSborki ? new Date(dateSborki) : '',
    'Статус': status,
    'Критичность дефекта': criticality,
    'Дата приемки': dateAcc ? new Date(dateAcc) : '',
    'Несоответсвия СБОРКИ КАБИНЫ': [...catCodes['1']].join(','),
    'Несоответсвия СБОРКИ ИНЖЕНЕРИИ': [...catCodes['2']].join(','),
    'Несоответствия УСТАНОВКИ САНТЕХ ПРИБОРОВ': [...catCodes['3']].join(','),
    'Несоответсвия УКЛАДКИ ПЛИТКИ': [...catCodes['4']].join(','),
    'Несоответсвия УСТАНОВКИ ПОТОЛКА': [...catCodes['5']].join(','),
    'Несоответсвия ИТОГОВАЯ ПРИЕМКА': [...catCodes['6']].join(','),
    'Обоснование': notes.join(' / ')
  };
}
async function exportReestr(){
  toast('Собираю реестр…');
  const idxA = await getIndexList('assembly');
  const idxF = await getIndexList('finishing');
  const bySlug = {};
  idxA.forEach(e=>{ bySlug[e.slug]=bySlug[e.slug]||{cabin:e.cabin}; bySlug[e.slug].aSlug=e.slug; });
  idxF.forEach(e=>{ bySlug[e.slug]=bySlug[e.slug]||{cabin:e.cabin}; bySlug[e.slug].fSlug=e.slug; });
  const rows=[];
  for(const slug of Object.keys(bySlug)){

      shifrRows.push({'Шифр':c.code, 'Несоответствие':c.text, 'Проверено':''});
    });
  });
  const wsShifr = XLSX.utils.json_to_sheet(shifrRows);
  wsShifr['!cols']=[{wch:8},{wch:60},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsShifr, 'Шифры несоответствий');

/* ---------- render ---------- */
function stageStatusFor(stage, data){
  let total=0, checked=0, bad=0;
  stage.blocks.forEach(b=>b.items.forEach(it=>{
    total++;
    const st = data.items[it.id] && data.items[it.id].status;
    if(st){ checked++; if(st==='bad') bad++; }
  }));
  if(bad>0) return 'issue';
  if(checked===0) return 'empty';
  if(checked===total) return 'done';
  return 'partial';
}
function stageStatus(stage){ return stageStatusFor(stage, state.data); }
function computeStageProgress(type, data){
  const stages = DATA[type].stages;
  let lastTouched = 0, doneCount = 0, signedCount = 0;
  stages.forEach((stage,i)=>{
    const status = stageStatusFor(stage, data);
    const signed = !!(data.stageSign && data.stageSign[stage.id]);
    if(status!=='empty' || signed) lastTouched = i+1;
    if(status==='done') doneCount++;
    if(signed) signedCount++;
  });
  return {
    lastTouched,
    totalStages: stages.length,
    lastTouchedTitle: lastTouched>0 ? stages[lastTouched-1].title : '',
    doneCount,
    signedCount
  };
}

function renderSignoff(stage){

function toLocalInput(iso){
  if(!iso) return '';

  if(isNaN(d)) return '';
  const p = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());

function acceptDuration(meta){
  if(!meta || !meta.acceptStart || !meta.acceptEnd) return '';
  const ms = new Date(meta.acceptEnd) - new Date(meta.acceptStart);
  if(isNaN(ms) || ms < 0) return '';
  const mins = Math.round(ms/60000);
  const h = Math.floor(mins/60), m = mins%60;
  return (h?h+' ч ':'') + m + ' мин';
}

document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  if(action==='stop') return;
  const MUTATING={status:1,'toggle-code':1,'toggle-note':1,'unsign-stage':1,'accept-now':1,'accept-clear':1,'delete-cabin':1};
  if(MUTATING[action] && !canEdit()){ toast('Только просмотр — войдите как инспектор ОТК'); return; }
  switch(action){
    case 'home-tab': state.homeTab = el.dataset.type; render(); refreshIndex(state.homeTab); break;
    case 'open-cabin': openCabin(el.dataset.type, state.cabinInputValue); break;
    case 'open-cabin-card': openCabin(el.dataset.type, el.dataset.cabin); break;
    case 'delete-cabin': handleDeleteClick(el.dataset.type, el.dataset.slug); break;
    case 'back-home': goHome(); break;
    case 'goto-stage': state.stageIndex = parseInt(el.dataset.index,10); state.showSummary=false; render(); break;
    case 'prev-stage': if(state.stageIndex>0){ state.stageIndex--; render(); } break;
    case 'next-stage': if(state.stageIndex<currentStages().length-1){ state.stageIndex++; render(); } break;
    case 'status': setStatus(el.dataset.item, el.dataset.val); break;
    case 'toggle-code': toggleCode(el.dataset.item, el.dataset.code); break;
    case 'toggle-note': toggleNote(el.dataset.item); break;
    case 'sign-stage': signStage(el.dataset.stage); break;
    case 'unsign-stage': unsignStage(el.dataset.stage); break;
    case 'open-summary': state.showSummary=true; render(); break;
    case 'close-summary': state.showSummary=false; render(); break;
    case 'print-act': window.print(); break;
    case 'accept-now': setAcceptTime(el.dataset.which, null, true); break;
    case 'accept-clear': setAcceptTime(el.dataset.which, '', true); break;
    case 'open-inspector-login': openInspectorLogin(null); break;
    case 'exit-inspector': exitInspector(); break;
    case 'confirm-inspector': confirmInspector(); break;
    case 'close-mode': state.showModeModal=false; state.pendingSignStage=null; render(); break;
    case 'open-analytics': openAnalytics(el.dataset.type); break;
    case 'export-reestr': exportReestr(); break;
  }
});

const SEED_FLAG = 'registry_seed_v2';
async function seedFromRegistry(){
  let done=null; try{ done = await storageGet(SEED_FLAG); }catch(e){}
  if(done) return;                                   // импорт выполняется один раз
  const base = Date.now();
  const idx = {assembly:[], finishing:[]};
  for(let i=0;i<REGISTRY_SEED.length;i++){
    const entry = REGISTRY_SEED[i];
    const cabin = entry.cabin, slug = slugify(cabin);
    const ts = new Date(base - i*1000).toISOString();
    const recs = {
      assembly:{meta:{cabin,type:'assembly', createdAt:ts,updatedAt:ts,inspectorName:''}, items:{}, stageSign:{}},
      finishing:{meta:{cabin,type:'finishing',createdAt:ts,updatedAt:ts,inspectorName:''}, items:{}, stageSign:{}}
    };
    (entry.codes||[]).forEach(code=>{
      const item = CODE_TO_ITEM[code];
      if(!item) return;                              // нет привязки — пропускаем
      const type = item.split('_')[0];
      const rec = recs[type];
      if(!rec.items[item]) rec.items[item] = {status:'bad', note:'', codes:[]};
      rec.items[item].status = 'bad';
      if(rec.items[item].codes.indexOf(code)<0) rec.items[item].codes.push(code);
    });
    for(const type of ['assembly','finishing']){
      const data = recs[type];
      await storageSet('cl_'+type+'_'+slug, JSON.stringify(data));
      const s = computeSummary(type,data), sp = computeStageProgress(type,data);
      idx[type].push(Object.assign({slug,cabin,updatedAt:ts}, s, sp));
    }
  }
  try{ await storageSet('idx_assembly',  JSON.stringify(idx.assembly));  }catch(e){}
  try{ await storageSet('idx_finishing', JSON.stringify(idx.finishing)); }catch(e){}
  try{ await storageSet(SEED_FLAG, new Date().toISOString()); }catch(e){}
  state.cabinIndexCache.assembly  = idx.assembly;
  state.cabinIndexCache.finishing = idx.finishing;
}
(async function(){
  await loadModeState();
  await seedFromRegistry();
  render();
  await refreshIndex(state.homeTab);
})();
</script>
