<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ОТК · Приёмка сантехкабины</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1F3;
    --bg-grid:#E1E7EB;
    --surface:#FFFFFF;
    --surface-2:#F6F8F9;
    --ink:#1B2430;
    --ink-soft:#5B6573;
    --ink-faint:#8993A1;
    --line:#D7DCE1;
    --line-strong:#C2C9D0;
    --blue:#1E5F8C;
    --blue-deep:#16486B;
    --blue-bg:#E6EEF3;
    --rust:#B5562B;
    --rust-deep:#8E4220;
    --rust-bg:#F3E7E0;
    --ok:#2E7D4F;
    --ok-bg:#E4F2E9;
    --bad:#C23B3B;
    --bad-bg:#FBEAEA;
    --na:#8A8F98;
    --na-bg:#EEF0F2;
    --crit:#C9821A;
    --radius:14px;
    --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,28,38,.06),0 8px 20px -10px rgba(20,28,38,.18);
    --font-d:'Oswald',sans-serif;
    --font-b:'Inter',sans-serif;
    --font-m:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px);
    background-size:26px 26px;
    font-family:var(--font-b);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button,input,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}

  #app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:28px;position:relative;}

  /* ---------- HOME ---------- */
  .hero{padding:30px 18px 14px;}
  .hero-eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .hero-title{font-family:var(--font-d);font-weight:600;font-size:clamp(24px,6vw,30px);margin:6px 0 8px;letter-spacing:.01em;line-height:1.15;}
  .hero-sub{font-size:14px;line-height:1.5;color:var(--ink-soft);margin:0;max-width:46ch;}

  .type-tabs{display:flex;gap:8px;padding:6px 18px 0;}
  .type-tab{flex:1;border:1.5px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);
    font-family:var(--font-d);font-size:13px;letter-spacing:.03em;text-transform:uppercase;
    padding:12px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:.15s;}
  .type-tab.tab-blue.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .type-tab.tab-rust.active{background:var(--rust);border-color:var(--rust);color:#fff;}
  .type-tab:not(.active):hover{border-color:var(--ink-faint);}

  .new-check{display:flex;gap:8px;padding:14px 18px 6px;}
  .cabin-input{flex:1;border:1.5px solid var(--line-strong);border-radius:var(--radius-sm);padding:11px 12px;
    font-family:var(--font-m);font-size:14px;background:var(--surface);color:var(--ink);}
  .cabin-input::placeholder{color:var(--ink-faint);font-family:var(--font-b);}
  .btn{border:none;border-radius:var(--radius-sm);padding:11px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
    transition:.15s;white-space:nowrap;}
  .btn-primary-blue{background:var(--blue);color:#fff;}
  .btn-primary-blue:hover{background:var(--blue-deep);}
  .btn-primary-rust{background:var(--rust);color:#fff;}
  .btn-primary-rust:hover{background:var(--rust-deep);}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);}
  .btn-summary{background:var(--ink);color:#fff;flex:1;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}

  .cabin-list{padding:14px 18px 0;display:flex;flex-direction:column;gap:10px;}
  .empty-hint{font-size:13.5px;color:var(--ink-faint);padding:18px 2px;line-height:1.5;}

  .cabin-card{display:flex;align-items:stretch;gap:0;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .cabin-card-main{flex:1;text-align:left;background:none;border:none;padding:13px 14px;cursor:pointer;}
  .cabin-card-top{display:flex;align-items:center;justify-content:space-between;}
  .cabin-id{font-family:var(--font-m);font-weight:600;font-size:14.5px;}
  .cabin-dot{width:9px;height:9px;border-radius:50%;}
  .dot-empty{background:var(--na);}
  .dot-partial{background:var(--blue);}
  .dot-done{background:var(--ok);}
  .dot-issue{background:var(--bad);}
  .cabin-progress-track{height:5px;background:var(--surface-2);border-radius:4px;margin:8px 0 6px;overflow:hidden;}
  .cabin-progress-fill{height:100%;border-radius:4px;}
  .fill-empty{background:var(--na);}
  .fill-partial{background:var(--blue);}
  .fill-done{background:var(--ok);}
  .fill-issue{background:var(--bad);}
  .cabin-meta{font-size:11.5px;color:var(--ink-faint);}
  .cabin-del{width:42px;border:none;background:var(--surface-2);color:var(--ink-faint);cursor:pointer;font-size:13px;
    border-left:1px solid var(--line);}
  .cabin-del.confirming{background:var(--bad);color:#fff;font-size:10.5px;font-weight:700;}

  /* ---------- CHECKLIST ---------- */
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;position:sticky;top:0;z-index:5;
    background:rgba(238,241,243,.92);backdrop-filter:blur(6px);}
  .iconbtn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--line-strong);background:var(--surface);
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .iconbtn:disabled{opacity:.3;}
  .topbar-info{flex:1;min-width:0;}
  .topbar-cabin{font-size:13px;color:var(--ink-soft);}
  .topbar-cabin b{font-family:var(--font-m);color:var(--ink);}
  .topbar-type{font-family:var(--font-d);font-size:15px;letter-spacing:.02em;text-transform:uppercase;}
  .accent-blue .topbar-type{color:var(--blue);}
  .accent-rust .topbar-type{color:var(--rust);}
  .save-indicator{font-size:10.5px;color:var(--ink-faint);font-family:var(--font-m);white-space:nowrap;}

  .stage-chips{display:flex;gap:7px;padding:2px 14px 14px;overflow-x:auto;}
  .chip{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:2px solid var(--line-strong);background:var(--surface);
    font-family:var(--font-m);font-weight:600;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .chip.active{border-color:var(--ink);color:var(--ink);box-shadow:0 0 0 3px rgba(27,36,48,.08);}
  .chip-empty{border-color:var(--line-strong);}
  .chip-partial{border-color:var(--blue);color:var(--blue);}
  .accent-rust .chip-partial{border-color:var(--rust);color:var(--rust);}
  .chip-done{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
  .chip-issue{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}

  .stage-panel{padding:0 14px;}
  .stage-head{padding:4px 4px 14px;}
  .stage-eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);}
  .stage-title{font-family:var(--font-d);font-weight:600;font-size:21px;margin:4px 0 2px;line-height:1.2;}
  .stage-sub{font-size:13px;color:var(--ink-soft);}

  .block-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);
    margin:18px 4px 8px;}

  .item{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--line-strong);
    border-radius:var(--radius-sm);padding:11px 12px;margin-bottom:8px;}
  .item.st-ok{border-left-color:var(--ok);}
  .item.st-bad{border-left-color:var(--bad);background:var(--bad-bg);}
  .item.st-na{border-left-color:var(--na);}
  .item-row{display:flex;gap:9px;align-items:flex-start;}
  .item-num{font-family:var(--font-m);font-size:11.5px;color:var(--ink-faint);padding-top:2px;min-width:16px;}
  .item-text{font-size:14px;line-height:1.42;flex:1;}
  .crit{color:var(--crit);margin-right:4px;}
  .item-controls{display:flex;gap:6px;margin-top:9px;}
  .sbtn{width:34px;height:30px;border-radius:7px;border:1.5px solid var(--line-strong);background:var(--surface);
    font-size:14px;cursor:pointer;color:var(--ink-soft);}
  .sbtn.ok.active{background:var(--ok);border-color:var(--ok);color:#fff;}
  .sbtn.bad.active{background:var(--bad);border-color:var(--bad);color:#fff;}
  .sbtn.na.active{background:var(--na);border-color:var(--na);color:#fff;}
  .ntbtn{margin-left:auto;width:34px;height:30px;border-radius:7px;border:1.5px solid var(--line);background:var(--surface-2);
    color:var(--ink-faint);cursor:pointer;}
  .ntbtn.has{color:var(--blue);border-color:var(--blue);}
  .note-area{width:100%;margin-top:9px;border:1px solid var(--line-strong);border-radius:7px;padding:8px 9px;
    font-size:13px;font-family:var(--font-b);resize:vertical;background:var(--surface);color:var(--ink);}

  .signoff{margin:18px 4px 26px;padding:14px;border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:var(--surface-2);}
  .signoff-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700;margin-bottom:9px;}
  .signoff-pending{display:flex;gap:8px;}
  .signoff-input{flex:1;border:1.5px solid var(--line-strong);border-radius:7px;padding:9px 10px;font-size:13px;background:var(--surface);}
  .btn-stamp{background:var(--ink);color:#fff;font-size:12.5px;padding:9px 12px;}
  .signoff-done{display:flex;align-items:center;gap:10px;}
  .mini-stamp{font-family:var(--font-d);font-size:11px;border:2px double var(--ok);color:var(--ok);
    border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;transform:rotate(-8deg);flex:0 0 auto;}
  .signoff-meta{flex:1;display:flex;flex-direction:column;font-size:12.5px;color:var(--ink-soft);}
  .signoff-meta b{font-size:13.5px;color:var(--ink);}
  .link-btn{background:none;border:none;color:var(--ink-faint);text-decoration:underline;font-size:12px;cursor:pointer;padding:0;}

  .bottom-bar{position:sticky;bottom:0;background:rgba(238,241,243,.95);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));margin-top:6px;}
  .progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .progress-track{flex:1;height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;border:1px solid var(--line);}
  .progress-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .2s;}
  .accent-rust .progress-fill{background:var(--rust);}
  .progress-label{font-family:var(--font-m);font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}
  .bottom-actions{display:flex;gap:8px;align-items:center;}

  /* ---------- MODAL ---------- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,28,38,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .modal{background:var(--surface);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:26px 22px calc(22px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:14px;animation:slideUp .25s ease-out;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .stamp{width:108px;height:108px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    transform:rotate(-7deg);font-family:var(--font-d);text-transform:uppercase;letter-spacing:.04em;
    animation:stampDown .35s cubic-bezier(.2,1.4,.4,1);}
  @keyframes stampDown{from{transform:rotate(-20deg) scale(1.5);opacity:0;}to{transform:rotate(-7deg) scale(1);opacity:1;}}
  .stamp span{font-size:19px;font-weight:700;}
  .stamp small{font-size:9.5px;letter-spacing:.06em;text-align:center;line-height:1.3;margin-top:2px;}
  .stamp--pending{border:3px double var(--na);color:var(--na);}
  .stamp--ok{border:3px double var(--ok);color:var(--ok);}
  .stamp--issues{border:3px double var(--crit);color:var(--crit);}
  .stamp--critical{border:3px double var(--bad);color:var(--bad);}
  .modal-stats{display:flex;gap:22px;}
  .modal-stats div{display:flex;flex-direction:column;align-items:center;}
  .modal-stats b{font-family:var(--font-m);font-size:18px;}
  .modal-stats span{font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;}
  .modal-cabin{font-size:13px;color:var(--ink-soft);}
  .modal-cabin b{font-family:var(--font-m);color:var(--ink);}
  .modal-actions{display:flex;gap:10px;width:100%;margin-top:4px;}
  .modal-actions .btn{flex:1;}

  @media print{
    .topbar,.stage-chips,.bottom-bar,.modal-actions,.cabin-del,.iconbtn{display:none !important;}
    body{background:#fff;}
    .item{break-inside:avoid;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA = {
  assembly:{
    label:'Сборка кабины', short:'Сборка', accent:'blue',
    stages:[
      {id:'s1', title:'Карта пола из металлокаркаса', subtitle:'Изготовление и заливка', items:[
        'Соответствие используемых материалов согласно проекту (размеры профильной трубы, сечение арматуры)',
        'Соответствие изготовленного металлокаркаса согласно проекту (габариты, диагональ, отверстия)',
        'Проверка сварных соединений',
        'Грунтовка металла',
        'Проверка состояния опалубочной поверхности (чистка, смазка, фиксаторы)',
        'Заливка соответствующей проекту бетонной смеси',
        'Заглажка поверхности',
        'Проверка набора прочности изделия пола после распалубки (при необходимости — вызвать лаборанта)',
        'Проверка прямолинейности пола правилом',
        'Грунтовка в два слоя и гидроизоляция'
      ]},
      {id:'s2', title:'Несущие стены: металлопрофиль + ГКЛВ', subtitle:'Изготовление',
        items:[
          'Проверка геометрических размеров каркаса (длина, ширина, диагональ)',
          'Проверка крепления профилей между собой саморезами и просекателем',
          'Проверка наличия антисептированного бруска в стене с дверным проёмом и его гидроизоляции',
          'Проверка крепления ГКЛВ к металлическому каркасу',
          'Проверка шага крепления шурупов к профилю (200–250 мм)',
          'Проверка монтажного зазора от низа профиля до ГКЛВ (10 мм)',
          'Проверка подгонки ГКЛВ под габариты каркаса',
          'Проверка гидроизоляции ГКЛВ по мокрым зонам кабины',
          'Проверка гидроизоляции в открытых участках ГКЛВ'
        ],
        groupNote:'Проверяется по всем четырём стенам кабины',
        subItems:['Стена фасадная','Стена торцевая','Стена левая','Стена правая']
      },
      {id:'s3', title:'Сборка СанТех кабины', subtitle:'Этап 3', items:[
        'Проверка выставления пола по нулевым отметкам',
        'Проверка наличия уплотнительной ленты в полу по периметру выставления стен',
        'Проверка герметика поверх уплотнительной ленты',
        'Проверка плотности прилегания стен между собой',
        'Замер внутренних и наружных габаритов кабины',
        'Замер диагоналей по внутренним стенам',
        'Проверка прямоугольности углов угловой линейкой (90°)',
        'Проверка крепления стеновых панелей к каркасу пола (шаг 200±50 мм)',
        'Проверка стыковки стен между собой саморезами (шаг 200±50 мм)',
        'Проверка установки потолка к стенам по периметру (шаг 200±50 мм, отступ от края 25±5 мм)'
      ]},
      {id:'s4', title:'Полочка инсталляции', subtitle:'Этап 4', items:[
        'Проверка габаритов полочки инсталляции',
        'Проверка крепления полочки инсталляции к стене',
        'Проверка гидроизоляции по всей поверхности полки',
        'Проверка наличия герметика в стыках полки и стен',
        'Проверка отверстий в полочке по проекту',
        'Проверка крепления системы бачка инсталляции',
        'Проверка наличия герметика во всех стыках кабины (стена–пол, угловые стыки стен)'
      ]},
      {id:'s5', title:'Установка оконного блока', subtitle:'До и после запенивания',
        groups:[
          {label:'До запенивания', items:[
            'Поверхность оконного проёма обеспылена, очищена от загрязнений и масляных пятен',
            'Соответствие оконной рамы проекту',
            'Расположение оконной рамы относительно блока (центровка)',
            'Проверка уровня оконной рамы',
            'Шаг и количество анкеров (соответствие длины анкера)',
            'Наличие опорных колодок'
          ]},
          {label:'После запенивания', items:[
            'Соответствие пропенки монтажных зазоров',
            'Соответствие подоконника проекту (размеры)',
            'Запенка под подоконником',
            'Запенка углов подоконника'
          ]},
          {label:'Осмотр при предъявлении блока', items:[
            'Внутренняя проверка запенки под лентой (на ощупь)',
            'Осмотр стыка между штапиками',
            'Уплотнительная лента на штапике — без зажимов и загибов',
            'Отделка монтажного зазора под подоконником после запенки',
            'Наличие кронштейна и грунтовка кронштейна',
            'Открывание окна',
            'Наличие и шаг установки внутренних прижимных планок (зажим)',
            'Осмотр фурнитуры на чистоту',
            'Стыки между подоконником, рамой и откосами равномерно просиликонены',
            'Наличие заглушек на подоконнике (по бокам)',
            'Створки открываются и закрываются легко, без усилий',
            'Осмотр стеклопакета (количество камер, наличие трещин)',
            'Окно чистое: стыки ровные, нет царапин и сколов на раме и стеклопакете',
            'Наружная проверка запенки под лентой (на ощупь)'
          ]}
        ]
      }
    ]
  },
  finishing:{
    label:'Чистовая отделка', short:'Отделка', accent:'rust',
    stages:[
      {id:'f1', title:'Укладка плитки на пол', items:[
        'Соответствие плитки проекту (типоразмер, артикул, цвет)',
        'Ровность основания перед укладкой (допуск 2 мм/2 м)',
        'Толщина клеевого слоя (3–5 мм)',
        'Ширина межплиточных швов (±1,4 мм по проекту)',
        'Выравнивание плиток в одной плоскости (СВП)',
        'Проводка труб канализации за ванной',
        'Установка ванны (горизонтальное и вертикальное положение)',
        'Прочность приклеивания (простукивание, без пустот)',
        'Периметральные швы (деформационный шов)',
        'Уклон пола к сливному трапу (не менее 1%)',
        'Затирка швов — цвет и состав по проекту (на цементной основе)'
      ]},
      {id:'f2', title:'Укладка плитки на стены', items:[
        'Соответствие плитки проекту (типоразмер, артикул, цвет)',
        'Вертикальность укладки (отклонение не более 2 мм/2 м)',
        'Горизонтальность рядов по лазерному уровню',

function normalizeData(){
  Object.keys(DATA).forEach(typeKey=>{
    DATA[typeKey].stages.forEach((stage,si)=>{
      stage.num = si+1;
      if(stage.groups){
        stage.blocks = stage.groups.map(g=>({label:g.label, items:g.items}));
        delete stage.groups;
      } else {
        const blocks=[{items:stage.items}];
        if(stage.subItems){ blocks.push({label:stage.groupNote||'', items:stage.subItems}); }
        stage.blocks = blocks;
        delete stage.items; delete stage.subItems; delete stage.groupNote;
      }
      stage.blocks.forEach((block,bi)=>{
        block.items = block.items.map((raw,ii)=>{
          const obj = (typeof raw==='string') ? {t:raw,c:false} : {t:raw.t,c:!!raw.c};
          obj.id = typeKey+'_'+stage.id+'_'+bi+'_'+ii;
          return obj;
        });
      });
    });
  });
}
normalizeData();

let state = {
  screen:'home',
  homeTab:'assembly',
  cabinInputValue:'',
  cabinIndexCache:{assembly:[], finishing:[]},
  confirmDeleteSlug:null,
  type:null,
  cabin:null,
  data:null,
  stageIndex:0,
  openNotes:new Set(),
  showSummary:false,
  saveStatus:'idle'
};

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function slugify(s){ return String(s).trim().replace(/[\s\/\\'"]+/g,'_').slice(0,100) || 'cabin'; }
function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}
function currentTypeData(){ return DATA[state.type]; }
function currentStages(){ return DATA[state.type].stages; }

/* ---------- storage ---------- */
async function getIndexList(type){
  try{
    const res = await window.storage.get('idx_'+type, false);
    return res ? JSON.parse(res.value) : [];
  }catch(e){ return []; }
}
async function loadChecklistStorage(type, slug){
  try{
    const res = await window.storage.get('cl_'+type+'_'+slug, false);
    return res ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}
async function saveChecklistStorage(type, slug, data){
  try{ await window.storage.set('cl_'+type+'_'+slug, JSON.stringify(data), false); }
  catch(e){ console.error('save failed', e); }
}
function computeSummary(type, data){
  let total=0, checked=0, bad=0, criticalBad=0;
  DATA[type].stages.forEach(stage=>{
    stage.blocks.forEach(block=>{
      block.items.forEach(item=>{
        total++;
        const rec = data.items[item.id];
        const st = rec && rec.status;
        if(st){ checked++; if(st==='bad'){ bad++; if(item.c) criticalBad++; } }
      });
    });
  });
  return {total, checked, bad, criticalBad};
}
async function updateIndexSummary(type, slug, cabin, data){
  try{
    const idx = await getIndexList(type);
    const summary = computeSummary(type, data);
    const entry = Object.assign({slug, cabin, updatedAt:data.meta.updatedAt}, summary);
    const i = idx.findIndex(e=>e.slug===slug);
    if(i>=0) idx[i]=entry; else idx.unshift(entry);
    await window.storage.set('idx_'+type, JSON.stringify(idx), false);
    state.cabinIndexCache[type]=idx;
  }catch(e){ console.error('index save failed', e); }
}
async function refreshIndex(type){
  const list = await getIndexList(type);
  state.cabinIndexCache[type]=list;
  if(state.screen==='home') render();
}

let saveTimer=null;
function scheduleSave(){
  state.saveStatus='saving';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(flushSave,700);
  updateSaveIndicatorDom();
}
async function flushSave(){
  if(!state.type || !state.cabin) return;
  state.data.meta.updatedAt = new Date().toISOString();
  const slug = slugify(state.cabin);
  await saveChecklistStorage(state.type, slug, state.data);
  await updateIndexSummary(state.type, slug, state.cabin, state.data);
  state.saveStatus='saved';
  updateSaveIndicatorDom();
}
function saveIndicatorText(){
  if(state.saveStatus==='saving') return 'Сохранение…';
  if(state.saveStatus==='saved') return 'Сохранено · '+formatDate(new Date().toISOString()).split(' ')[1];
  return '';
}
function updateSaveIndicatorDom(){
  const el = document.getElementById('saveIndicator');
  if(el) el.textContent = saveIndicatorText();
}

/* ---------- actions ---------- */
async function openCabin(type, cabinRaw){
  const cabin = String(cabinRaw||'').trim();
  if(!cabin) return;
  const slug = slugify(cabin);
  state.type=type; state.cabin=cabin; state.stageIndex=0; state.openNotes=new Set(); state.showSummary=false;
  let existing = await loadChecklistStorage(type, slug);
  if(!existing){
    existing = {meta:{cabin, type, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), inspectorName:''}, items:{}, stageSign:{}};
  }
  if(!existing.meta) existing.meta={cabin,type,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),inspectorName:''};
  if(!existing.items) existing.items={};
  if(!existing.stageSign) existing.stageSign={};
  state.data = existing;
  state.cabinInputValue='';
  state.screen='checklist';
  state.saveStatus='idle';
  render();
  updateIndexSummary(type, slug, cabin, existing);
}
function goHome(){
  if(saveTimer){ clearTimeout(saveTimer); flushSave(); }
  state.screen='home';
  state.confirmDeleteSlug=null;
  render();
  refreshIndex(state.homeTab);
}
function ensureItem(id){ if(!state.data.items[id]) state.data.items[id]={status:null, note:''}; }
function setStatus(itemId, val){
  ensureItem(itemId);
  const cur = state.data.items[itemId];
  cur.status = (cur.status===val) ? null : val;
  if(cur.status==='bad') state.openNotes.add(itemId);
  render();
  scheduleSave();
}
function toggleNote(id){
  ensureItem(id);
  if(state.openNotes.has(id)) state.openNotes.delete(id); else state.openNotes.add(id);
  render();
}
function signStage(stageId){
  const name = (state.data.meta.inspectorName||'').trim();
  state.data.stageSign[stageId] = {name: name || 'Инспектор ОТК', date:new Date().toISOString()};
  render();
  scheduleSave();
}
function unsignStage(stageId){
  delete state.data.stageSign[stageId];
  render();
  scheduleSave();
}
function handleDeleteClick(type, slug){
  if(state.confirmDeleteSlug===slug){
    deleteCabin(type, slug);
  } else {
    state.confirmDeleteSlug=slug;
    render();
    setTimeout(()=>{ if(state.confirmDeleteSlug===slug){ state.confirmDeleteSlug=null; render(); } }, 3000);
  }
}
async function deleteCabin(type, slug){
  try{ await window.storage.delete('cl_'+type+'_'+slug, false); }catch(e){}
  const idx = await getIndexList(type);
  const next = idx.filter(e=>e.slug!==slug);
  try{ await window.storage.set('idx_'+type, JSON.stringify(next), false); }catch(e){}
  state.cabinIndexCache[type]=next;
  state.confirmDeleteSlug=null;
  render();
}

/* ---------- render ---------- */
function stageStatus(stage){
  let total=0, checked=0, bad=0;
  stage.blocks.forEach(b=>b.items.forEach(it=>{
    total++;
    const st = state.data.items[it.id] && state.data.items[it.id].status;
    if(st){ checked++; if(st==='bad') bad++; }
  }));
  if(bad>0) return 'issue';
  if(checked===0) return 'empty';
  if(checked===total) return 'done';
  return 'partial';
}
function renderItem(item, n){
  const rec = state.data.items[item.id] || {};
  const status = rec.status || null;
  const note = rec.note || '';
  const noteOpen = state.openNotes.has(item.id) || status==='bad';
  return '<div class="item st-'+(status||'none')+'">'
    +'<div class="item-row">'
      +'<span class="item-num">'+n+'</span>'
      +'<div class="item-text">'+(item.c?'<span class="crit" title="Критический пункт">★</span>':'')+escapeHtml(item.t)+'</div>'
    +'</div>'
    +'<div class="item-controls">'
      +'<button class="sbtn ok '+(status==='ok'?'active':'')+'" data-action="status" data-item="'+item.id+'" data-val="ok">✓</button>'
      +'<button class="sbtn bad '+(status==='bad'?'active':'')+'" data-action="status" data-item="'+item.id+'" data-val="bad">✗</button>'
      +'<button class="sbtn na '+(status==='na'?'active':'')+'" data-action="status" data-item="'+item.id+'" data-val="na">—</button>'
      +'<button class="ntbtn '+(note?'has':'')+'" data-action="toggle-note" data-item="'+item.id+'">✎</button>'
    +'</div>'
    +(noteOpen ? '<textarea class="note-area" rows="2" placeholder="Комментарий к пункту…" data-action="note" data-item="'+item.id+'">'+escapeHtml(note)+'</textarea>' : '')
    +'</div>';
}
function renderSignoff(stage){
  const sign = state.data.stageSign[stage.id];
  if(sign){
    return '<div class="signoff"><div class="signoff-label">Предъявление работ инспектору ОТК</div>'
      +'<div class="signoff-done"><div class="mini-stamp">ОТК</div>'
      +'<div class="signoff-meta"><b>'+escapeHtml(sign.name)+'</b><span>'+formatDate(sign.date)+'</span></div>'
      +'<button class="link-btn" data-action="unsign-stage" data-stage="'+stage.id+'">Отменить</button></div></div>';
  }
  return '<div class="signoff"><div class="signoff-label">Предъявление работ инспектору ОТК</div>'
    +'<div class="signoff-pending">'
    +'<input type="text" class="signoff-input" placeholder="ФИО инспектора" value="'+escapeHtml(state.data.meta.inspectorName||'')+'" data-action="inspector-name-input">'
    +'<button class="btn btn-stamp" data-action="sign-stage" data-stage="'+stage.id+'">Поставить отметку</button>'
    +'</div></div>';
}
function renderStageContent(stage){
  let counter=1;
  const blocksHtml = stage.blocks.map(block=>{
    const itemsHtml = block.items.map(it=>renderItem(it, counter++)).join('');
    return (block.label?'<div class="block-label">'+escapeHtml(block.label)+'</div>':'') + itemsHtml;
  }).join('');
  return '<div class="stage-head">'
    +'<div class="stage-eyebrow">Этап '+stage.num+' из '+currentTypeData().stages.length+'</div>'
    +'<h2 class="stage-title">'+escapeHtml(stage.title)+'</h2>'
    +(stage.subtitle?'<div class="stage-sub">'+escapeHtml(stage.subtitle)+'</div>':'')
    +'</div><div class="items">'+blocksHtml+'</div>'+renderSignoff(stage);
}
function renderSummaryModal(){
  if(!state.showSummary) return '';
  const summary = computeSummary(state.type, state.data);
  let stampKind = 'pending';
  if(summary.checked>=summary.total && summary.total>0){
    stampKind = summary.criticalBad>0 ? 'critical' : (summary.bad>0 ? 'issues' : 'ok');
  } else if(summary.bad>0){
    stampKind = summary.criticalBad>0 ? 'critical' : 'issues';
  }
  const stampText = {pending:'В РАБОТЕ', issues:'ЕСТЬ ЗАМЕЧАНИЯ', critical:'КРИТИЧНО', ok:'ПРИНЯТО'}[stampKind];
  return '<div class="modal-backdrop" data-action="close-summary">'
    +'<div class="modal" data-action="stop">'
    +'<div class="stamp stamp--'+stampKind+'"><span>ОТК</span><small>'+stampText+'</small></div>'
    +'<div class="modal-stats">'
      +'<div><b>'+summary.checked+'/'+summary.total+'</b><span>проверено</span></div>'
      +'<div><b>'+summary.bad+'</b><span>замечаний</span></div>'
      +'<div><b>'+summary.criticalBad+'</b><span>критичных</span></div>'
    +'</div>'
    +'<div class="modal-cabin">Кабина <b>'+escapeHtml(state.cabin)+'</b> · '+currentTypeData().label+'</div>'
    +'<div class="modal-actions">'
      +'<button class="btn btn-ghost" data-action="print-act">Печать</button>'
      +'<button class="btn btn-primary-'+currentTypeData().accent+'" data-action="close-summary">Закрыть</button>'
    +'</div></div></div>';
}

function renderCabinList(){
  const type = state.homeTab;
  const list = state.cabinIndexCache[type] || [];
  if(list.length===0) return '<div class="empty-hint">Пока нет начатых проверок в этом разделе. Введите номер кабины выше, чтобы начать.</div>';
  const sorted = [...list].sort((a,b)=> new Date(b.updatedAt)-new Date(a.updatedAt));
  return sorted.map(e=>{
    const pct = e.total ? Math.round(e.checked/e.total*100) : 0;
    const cls = e.bad>0 ? 'issue' : (e.checked===e.total && e.total>0 ? 'done' : (e.checked>0?'partial':'empty'));
    const confirming = state.confirmDeleteSlug===e.slug;
    return '<div class="cabin-card">'
      +'<button class="cabin-card-main" data-action="open-cabin-card" data-type="'+type+'" data-cabin="'+escapeHtml(e.cabin)+'">'
        +'<div class="cabin-card-top"><span class="cabin-id">'+escapeHtml(e.cabin)+'</span><span class="cabin-dot dot-'+cls+'"></span></div>'
        +'<div class="cabin-progress-track"><div class="cabin-progress-fill fill-'+cls+'" style="width:'+pct+'%"></div></div>'
        +'<div class="cabin-meta">'+e.checked+'/'+e.total+' · '+(e.bad>0?e.bad+' замеч.':'без замечаний')+' · '+formatDate(e.updatedAt)+'</div>'
      +'</button>'
      +'<button class="cabin-del '+(confirming?'confirming':'')+'" data-action="delete-cabin" data-type="'+type+'" data-slug="'+e.slug+'">'+(confirming?'Удалить?':'✕')+'</button>'
    +'</div>';
  }).join('');

/* ---------- events ---------- */
document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  if(action==='stop') return;
  switch(action){
    case 'home-tab': state.homeTab = el.dataset.type; render(); refreshIndex(state.homeTab); break;
    case 'open-cabin': openCabin(el.dataset.type, state.cabinInputValue); break;
    case 'open-cabin-card': openCabin(el.dataset.type, el.dataset.cabin); break;
    case 'delete-cabin': handleDeleteClick(el.dataset.type, el.dataset.slug); break;
    case 'back-home': goHome(); break;
    case 'goto-stage': state.stageIndex = parseInt(el.dataset.index,10); state.showSummary=false; render(); break;
    case 'prev-stage': if(state.stageIndex>0){ state.stageIndex--; render(); } break;
    case 'next-stage': if(state.stageIndex<currentStages().length-1){ state.stageIndex++; render(); } break;
    case 'status': setStatus(el.dataset.item, el.dataset.val); break;
    case 'toggle-note': toggleNote(el.dataset.item); break;
    case 'sign-stage': signStage(el.dataset.stage); break;
    case 'unsign-stage': unsignStage(el.dataset.stage); break;
    case 'open-summary': state.showSummary=true; render(); break;
    case 'close-summary': state.showSummary=false; render(); break;
    case 'print-act': window.print(); break;
  }
});
document.addEventListener('input', function(e){
  const el = e.target;
  const action = el.dataset ? el.dataset.action : null;
  if(action==='cabin-input'){ state.cabinInputValue = el.value; }
  else if(action==='note'){ const id=el.dataset.item; ensureItem(id); state.data.items[id].note = el.value; scheduleSave(); }
  else if(action==='inspector-name-input'){ state.data.meta.inspectorName = el.value; scheduleSave(); }
});
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && e.target.dataset && e.target.dataset.action==='cabin-input'){
    openCabin(state.homeTab, state.cabinInputValue);
  }
});

render();
refreshIndex('assembly');
</script>
</body>
</html>
